  <body>
    <div id="__fade" style="position:fixed;inset:0;background:#000;opacity:1;z-index:9999;pointer-events:none;transition:opacity 1s ease"></div>
    <script>
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          document.getElementById('__fade').style.opacity = '0';
          setTimeout(function() { document.getElementById('__fade').remove(); }, 1100);
        });
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
